# ============================================================
# Render Blueprint - ICS Booking System
# ============================================================
# Place this file in the ROOT of your repository (CLEAN_PACKAGE/)
# Documentation: https://render.com/docs/blueprint-spec
#
# ARCHITECTURE CHANGE:
#   BEFORE: api/ (Flask API) + website/ (Render Static Site)
#   AFTER:  api/ (Flask) serves EVERYTHING — homepage, API, admin
#           website/css, website/images, website/js are served
#           via Flask routes defined in api.py (WEBSITE_DIR routes)
#           The separate ics-website static service is removed.
#
# AFTER DEPLOYING:
#   1. In Render dashboard, point your custom domain ics.cw
#      to ics-admin (not the old ics-website service).
#   2. Delete the old ics-website static service in Render.
#   3. In Cloudflare, ensure DNS A/CNAME for ics.cw points
#      to the ics-admin Render URL (not the old static site URL).
# ============================================================

services:

  # ===========================================
  # Web Service — Flask (API + Website)
  # ===========================================
  - type: web
    name: ics-admin                       # ← Matches your existing Render service
    runtime: python
    region: ohio                          # Closest to Caribbean/Curaçao
    plan: free                            # Upgrade to 'starter' for production
    rootDir: api                          # ← All Flask code lives in api/
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api:app --bind 0.0.0.0:$PORT --workers 2
    healthCheckPath: /health

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"

      - key: SECRET_KEY
        generateValue: true               # Auto-generate secure key

      - key: JWT_SECRET_KEY
        generateValue: true               # Auto-generate secure key

      - key: FLASK_ENV
        value: production

      # CORS — allow ics.cw and admin subdomain
      - key: ALLOWED_ORIGINS
        value: "https://ics.cw,https://www.ics.cw"

      # Email — set these manually in Render Dashboard → Environment
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_ENABLED
        value: "true"
